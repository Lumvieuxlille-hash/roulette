<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUM - Pilotage Coffee Shop</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #faf1e6;
            --text-color: #954825;
            --border-color: #dcbfa6;
            --accent-color: #7a3a1d;
            --card-bg: #fffbf7;
            --danger: #c62828;
            --success: #2e7d32;
        }

        body {
            font-family: 'Segoe UI', serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 20px;
            line-height: 1.6;
        }

        /* --- HEADER & LOGO --- */
        header {
            display: flex; align-items: center;
            justify-content: space-between;
            margin-bottom: 30px; padding-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
        }
        .logo-box { display: flex; align-items: center; gap: 20px; }
        .logo-img {
            width: 100px; height: 100px;
            object-fit: contain;
            border-radius: 8px;
        }

        /* --- NAVIGATION --- */
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab-btn {
            background: none; border: 2px solid var(--text-color);
            color: var(--text-color); padding: 12px 25px;
            cursor: pointer; font-weight: bold; border-radius: 5px;
            transition: 0.3s;
        }
        .tab-btn.active, .tab-btn:hover {
            background: var(--text-color); color: var(--bg-color);
        }

        /* --- DASHBOARD --- */
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .kpi-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; margin-bottom: 30px;
        }
        .kpi-card {
            background: var(--card-bg); border: 1px solid var(--border-color);
            padding: 20px; border-radius: 12px; text-align: center;
            box-shadow: 0 4px 15px rgba(149, 72, 37, 0.05);
        }
        .kpi-card h3 { margin: 0 0 10px; font-size: 0.9em; text-transform: uppercase; opacity: 0.7; }
        .kpi-val { font-size: 1.8em; font-weight: bold; }
        .status-warn { color: orange; font-weight: bold; font-size: 0.8em; }

        .main-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }

        /* --- FORMULAIRE --- */
        .box {
            background: var(--card-bg); border: 1px solid var(--border-color);
            padding: 25px; border-radius: 12px;
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
        input, select, textarea {
            width: 100%; padding: 10px; border: 1px solid var(--border-color);
            border-radius: 6px; background: var(--bg-color); color: var(--accent-color);
            box-sizing: border-box;
        }
        .btn-add {
            background: var(--text-color); color: white; border: none;
            padding: 15px; width: 100%; border-radius: 6px;
            font-weight: bold; cursor: pointer; font-size: 1em;
        }
        .btn-add:hover { background: var(--accent-color); }

        /* --- TABLEAU --- */
        .reg-tools { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; }
        .btn-export { background: #5d4037; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--bg-color); }
        th { background: var(--text-color); color: white; }
        .row-in { color: var(--success); font-weight: bold; }
        .btn-del { color: var(--danger); border: 1px solid var(--danger); background: none; padding: 5px 8px; border-radius: 4px; cursor: pointer; }
        .btn-del:hover { background: var(--danger); color: white; }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <img src="LOGO LUM.png" alt="LUM Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/100?text=LUM'">
        <div>
            <h1 style="color: var(--text-color); margin:0;">Pilotage Financier</h1>
            <small>LUM Coffee Shop</small>
        </div>
    </div>
</header>

<div class="nav-tabs">
    <button class="tab-btn active" onclick="switchTab('dash')">Tableau de Bord</button>
    <button class="tab-btn" onclick="switchTab('reg')">Registre & Export</button>
</div>

<div id="dash" class="tab-content active">
    <div class="kpi-grid">
        <div class="kpi-card"><h3>Chiffre d'Affaires</h3><div class="kpi-val" id="kpi-ca">0.00 €</div></div>
        <div class="kpi-card"><h3>Résultat Net</h3><div class="kpi-val" id="kpi-net">0.00 €</div></div>
        <div class="kpi-card">
            <h3>Ratio Matière</h3>
            <div class="kpi-val" id="kpi-ratio">0%</div>
            <div id="ratio-alert" class="status-warn"></div>
        </div>
        <div class="kpi-card"><h3>Panier Moyen</h3><div class="kpi-val" id="kpi-basket">0.00 €</div></div>
    </div>

    <div class="main-layout">
        <div class="box">
            <h2>Nouvelle Transaction</h2>
            <form id="tx-form">
                <div class="form-row">
                    <div><label>Date</label><input type="date" id="f-date" required></div>
                    <div><label>Type</label>
                        <select id="f-type" onchange="toggleInputs()">
                            <option value="Dépense">Dépense</option>
                            <option value="Entrée">Entrée d'argent</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div><label>Catégorie</label><select id="f-cat"></select></div>
                    <div><label>TVA (%)</label>
                        <select id="f-tva">
                            <option value="5.5">5.5% (Alim. emporté)</option>
                            <option value="10">10% (Alim. sur place)</option>
                            <option value="20">20% (Matériel/Alcool)</option>
                            <option value="0">0% (Franchise/Salaires)</option>
                        </select>
                    </div>
                </div>
                <div class="form-row" id="row-tickets" style="display:none;">
                    <div style="grid-column: span 2;">
                        <label>Nombre de clients (Tickets)</label>
                        <input type="number" id="f-tickets" placeholder="Ex: 45">
                    </div>
                </div>
                <div class="form-group" style="margin-bottom:15px;">
                    <label>Libellé court</label>
                    <input type="text" id="f-lab" placeholder="Ex: Grossiste Lait" required>
                </div>
                <div class="form-group" style="margin-bottom:15px;">
                    <label>Désignation détaillée</label>
                    <textarea id="f-desc" rows="2" placeholder="Ex: 4 cartons Oatly + 2 cartons amande"></textarea>
                </div>
                <div class="form-group" style="margin-bottom:20px;">
                    <label>Montant TTC (€)</label>
                    <input type="number" step="0.01" id="f-amt" required>
                </div>
                <button type="submit" class="btn-add">Enregistrer</button>
            </form>
        </div>
        <div class="box">
            <h2>Répartition des Coûts</h2>
            <canvas id="chart"></canvas>
        </div>
    </div>
</div>

<div id="reg" class="tab-content">
    <div class="box">
        <div class="reg-tools">
            <div style="display:flex; gap:10px;">
                <div><label>Début</label><input type="date" id="filter-s"></div>
                <div><label>Fin</label><input type="date" id="filter-e"></div>
                <button class="btn-export" onclick="applyFilters()" style="background:var(--text-color)">Filtrer</button>
            </div>
            <button class="btn-export" onclick="exportCSV()">⬇️ Export Excel (CSV)</button>
        </div>
        <table id="reg-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Type</th>
                    <th>Catégorie</th>
                    <th>Désignation</th>
                    <th>TVA</th>
                    <th>Montant TTC</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="reg-body"></tbody>
        </table>
    </div>
</div>

<script>
    // --- GESTION DES DONNÉES (LocalStorage) ---
    let db = JSON.parse(localStorage.getItem('lum_data')) || [];
    let chartObj = null;

    function save() {
        localStorage.setItem('lum_data', JSON.stringify(db));
        render();
    }

    // --- LOGIQUE FORMULAIRE ---
    function toggleInputs() {
        const type = document.getElementById('f-type').value;
        const catS = document.getElementById('f-cat');
        const ticketsRow = document.getElementById('row-tickets');
        catS.innerHTML = '';
        
        if (type === 'Dépense') {
            ['Stock', 'Structure', 'RH', 'Investissement'].forEach(c => catS.add(new Option(c, c)));
            ticketsRow.style.display = 'none';
        } else {
            ['Ventes', 'Apport'].forEach(c => catS.add(new Option(c, c)));
            ticketsRow.style.display = 'block';
        }
    }

    document.getElementById('tx-form').onsubmit = (e) => {
        e.preventDefault();
        const tx = {
            id: Date.now(),
            date: document.getElementById('f-date').value,
            type: document.getElementById('f-type').value,
            cat: document.getElementById('f-cat').value,
            tva: document.getElementById('f-tva').value,
            lab: document.getElementById('f-lab').value,
            desc: document.getElementById('f-desc').value,
            amt: parseFloat(document.getElementById('f-amt').value),
            tickets: parseInt(document.getElementById('f-tickets').value) || 0
        };
        db.push(tx);
        e.target.reset();
        document.getElementById('f-date').valueAsDate = new Date();
        toggleInputs();
        save();
    };

    // --- CALCULS & RENDU ---
    function render(data = db) {
        let ca = 0, dep = 0, stock = 0, tickets = 0;
        const tbody = document.getElementById('reg-body');
        tbody.innerHTML = '';

        data.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(t => {
            if (t.type === 'Entrée') { ca += t.amt; tickets += t.tickets; }
            else { dep += t.amt; if(t.cat === 'Stock') stock += t.amt; }

            const tr = document.createElement('tr');
            if(t.type === 'Entrée') tr.className = 'row-in';
            tr.innerHTML = `
                <td>${t.date}</td>
                <td>${t.type}</td>
                <td>${t.cat}</td>
                <td><strong>${t.lab}</strong><br><small>${t.desc}</small></td>
                <td>${t.tva}%</td>
                <td>${t.amt.toFixed(2)} €</td>
                <td><button class="btn-del" onclick="del(${t.id})">✕</button></td>
            `;
            tbody.appendChild(tr);
        });

        // Update KPIs
        document.getElementById('kpi-ca').innerText = ca.toFixed(2) + " €";
        document.getElementById('kpi-net').innerText = (ca - dep).toFixed(2) + " €";
        document.getElementById('kpi-net').style.color = (ca - dep) >= 0 ? 'var(--success)' : 'var(--danger)';
        
        const ratio = ca > 0 ? (stock / ca * 100) : 0;
        document.getElementById('kpi-ratio').innerText = ratio.toFixed(1) + "%";
        document.getElementById('ratio-alert').innerText = ratio > 30 ? "⚠️ Coût trop élevé (>30%)" : "";

        const basket = tickets > 0 ? (ca / tickets) : 0;
        document.getElementById('kpi-basket').innerText = basket.toFixed(2) + " €";

        updateChart();
    }

    function del(id) { if(confirm("Supprimer ?")) { db = db.filter(t => t.id !== id); save(); } }

    function switchTab(id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.target.classList.add('active');
    }

    // --- EXPORT CSV ---
    function exportCSV() {
        let csv = "Date;Type;Categorie;Libelle;Description;TVA;Montant TTC\n";
        db.forEach(t => {
            csv += `${t.date};${t.type};${t.cat};${t.lab};${t.desc.replace(/;/g,',')};${t.tva};${t.amt}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "comptabilite_LUM.csv";
        link.click();
    }

    function applyFilters() {
        const s = document.getElementById('filter-s').value;
        const e = document.getElementById('filter-e').value;
        let filtered = db;
        if(s) filtered = filtered.filter(t => t.date >= s);
        if(e) filtered = filtered.filter(t => t.date <= e);
        render(filtered);
    }

    function updateChart() {
        const ctx = document.getElementById('chart').getContext('2d');
        const cats = {};
        db.filter(t => t.type === 'Dépense').forEach(t => cats[t.cat] = (cats[t.cat] || 0) + t.amt);
        
        if(chartObj) chartObj.destroy();
        chartObj = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: Object.keys(cats),
                datasets: [{
                    data: Object.values(cats),
                    backgroundColor: ['#954825', '#b56d4b', '#dcbfa6', '#7a3a1d'],
                    borderWidth: 0
                }]
            },
            options: { plugins: { legend: { position: 'bottom' } } }
        });
    }

    document.getElementById('f-date').valueAsDate = new Date();
    toggleInputs();
    render();
</script>

</body>
</html>
